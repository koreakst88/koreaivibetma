<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шпаргалки</title>

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Amplitude Browser SDK -->
    <script src="js/amplitude.min.js"></script>
    <script src="js/analytics.js"></script>

    <!-- Local CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-50 text-gray-900 font-sans min-h-screen flex flex-col">

    <div class="container max-w-3xl mx-auto p-4 flex-grow flex flex-col">

        <!-- Header -->
        <header class="mb-6 flex items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <button onclick="goBack()"
                class="text-blue-500 hover:text-blue-700 font-medium flex items-center transition-colors">
                <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Назад
            </button>
            <h1 class="text-xl font-bold ml-4 text-gray-800 truncate flex-grow">📋 Шпаргалки</h1>
        </header>

        <!-- Табы -->
        <div class="mb-6">
            <ul class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide text-sm font-medium text-center" id="tabs-list">
                <li class="flex-none">
                    <button onclick="switchTab('terminal')" id="tab-terminal"
                        class="tab-btn inline-block px-5 py-2.5 bg-blue-500 text-white rounded-lg shadow-sm whitespace-nowrap transition-colors">💻
                        Терминал</button>
                </li>
                <li class="flex-none">
                    <button onclick="switchTab('git')" id="tab-git"
                        class="tab-btn inline-block px-5 py-2.5 bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 rounded-lg shadow-sm whitespace-nowrap transition-colors">🐙
                        Git</button>
                </li>
                <li class="flex-none">
                    <button onclick="switchTab('links')" id="tab-links"
                        class="tab-btn inline-block px-5 py-2.5 bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 rounded-lg shadow-sm whitespace-nowrap transition-colors">🔗
                        Ссылки</button>
                </li>
            </ul>
        </div>

        <!-- Основной контент (Таблицы и карточки) -->
        <main class="flex-grow">
            <div id="cheatsheets-container">
                <!-- Контент загружается через JS -->
            </div>
        </main>

    </div>

    <!-- Local JS -->
    <script src="js/telegram.js"></script>
    <script src="js/cheatsheets.js"></script>

</body>

</html>
