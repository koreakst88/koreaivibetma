<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка дня...</title>

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Amplitude Browser SDK -->
    <script src="js/amplitude.min.js"></script>
    <script src="js/session-replay.min.js"></script>
    <script src="js/analytics.js"></script>

    <!-- Marked.js (для рендеринга Markdown) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Local CSS -->
    <link rel="stylesheet" href="css/style.css?v=1.1">

    <!-- Стилизация для Markdown контента -->
    <style type="text/tailwindcss">
        .markdown-content {
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            hyphens: auto;
        }

        .markdown-content h1 {
            @apply text-3xl font-bold mt-8 mb-4 text-gray-900;
        }

        .markdown-content h2 {
            @apply text-2xl font-bold mt-6 mb-3 text-gray-800 border-b pb-2;
        }

        .markdown-content h3 {
            @apply text-xl font-bold mt-4 mb-2 text-gray-800;
        }

        .markdown-content p {
            @apply mb-4 text-gray-700 leading-relaxed;
        }

        .markdown-content ul {
            @apply list-disc ml-6 mb-4 text-gray-700 space-y-1;
        }

        .markdown-content ol {
            @apply list-decimal ml-6 mb-4 text-gray-700 space-y-1;
        }

        .markdown-content li {
            @apply mb-1;
        }

        .markdown-content code {
            @apply bg-gray-100 text-pink-600 px-1.5 py-0.5 rounded text-sm font-mono border border-gray-200;
        }

        .markdown-content pre {
            @apply bg-gray-800 text-gray-100 p-4 rounded-lg overflow-x-auto mb-6 shadow-inner;
        }

        .markdown-content pre code {
            @apply bg-transparent text-gray-100 p-0 border-0;
        }

        .markdown-content a {
            @apply text-blue-500 hover:text-blue-700 underline transition-colors;
        }

        .markdown-content strong {
            @apply font-bold text-gray-900;
        }

        .markdown-content blockquote {
            @apply border-l-4 border-blue-500 pl-4 py-1 mb-4 italic text-gray-600 bg-blue-50 rounded-r block;
        }

        .markdown-content hr {
            @apply my-8 border-gray-200;
        }

        .markdown-content img {
            @apply max-w-full h-auto rounded-lg shadow-sm mb-6 mx-auto block;
        }

        /* Стили чек-листов внутри Markdown */
        .markdown-content input[type="checkbox"] {
            @apply w-5 h-5 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 cursor-pointer mr-3 align-middle;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 font-sans min-h-screen flex flex-col overflow-x-hidden">

    <div class="container max-w-3xl mx-auto p-4 flex-grow flex flex-col w-full">

        <!-- Header -->
        <header class="mb-6 flex items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <button onclick="goBack()"
                class="text-blue-500 hover:text-blue-700 font-medium flex items-center transition-colors">
                <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Назад
            </button>
            <h1 id="day-title" class="text-xl font-bold ml-4 text-gray-800 truncate flex-grow">Загрузка...</h1>
        </header>

        <!-- Основной контент (Сюда отрендерится Markdown) -->
        <main class="bg-white rounded-xl shadow-sm p-6 md:p-8 mb-8 flex-grow border border-gray-100">
            <div id="day-content" class="markdown-content">
                <!-- Контент загружается через JS -->
                <div class="flex justify-center items-center h-32 text-gray-400">
                    <svg class="animate-spin -ml-1 mr-3 h-8 w-8 text-blue-500" xmlns="http://www.w3.org/2000/svg"
                        fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                    Загрузка урока...
                </div>
            </div>
        </main>

        <!-- Навигация (вниз страницы) -->
        <nav class="flex justify-between items-center mb-6 py-4 border-t border-gray-200 mt-auto">
            <button id="prev-day"
                class="hidden bg-white text-gray-700 border border-gray-300 px-5 py-2.5 rounded-lg font-medium hover:bg-gray-50 transition-colors shadow-sm flex items-center">
                <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                Предыдущий
            </button>

            <button id="next-day"
                class="hidden ml-auto bg-blue-500 text-white px-5 py-2.5 rounded-lg font-medium hover:bg-blue-600 transition-colors shadow-sm flex items-center">
                Следующий
                <svg class="w-4 h-4 ml-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </button>
        </nav>

    </div>

    <!-- Local JS -->
    <script src="js/access.js?v=1.1"></script>
    <script src="js/progress.js?v=1.1"></script>
    <script src="js/telegram.js?v=1.1"></script>
    <script src="js/day.js?v=1.1"></script>

</body>

</html>
