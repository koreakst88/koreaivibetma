<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка дня...</title>

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Amplitude Browser SDK -->
    <script src="js/amplitude.min.js"></script>
    <script src="js/session-replay.min.js"></script>
    <script src="js/analytics.js"></script>

    <!-- Marked.js (для рендеринга Markdown) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Local CSS -->
    <link rel="stylesheet" href="css/style.css?v=1.2">
</head>

<body class="lesson-page bg-gray-50 text-gray-900 font-sans min-h-screen overflow-x-hidden">

    <div id="app-container" class="lesson-app-shell">
        <header class="lesson-header">
            <div class="lesson-header__inner">
                <button onclick="goBack()" class="lesson-header__back native-back-button" aria-label="Назад">
                    <svg class="lesson-header__back-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 19l-7-7 7-7"></path>
                    </svg>
                </button>

                <span id="day-title" class="lesson-header__title">Загрузка...</span>

                <span id="day-status-badge" class="lesson-status-badge">Загрузка</span>
            </div>
        </header>

        <div class="lesson-progress-track" aria-hidden="true">
            <div id="lesson-progress-bar" class="lesson-progress-line" style="width: 0%"></div>
        </div>

        <main class="lesson-main">
            <section class="lesson-content-shell card">
                <div id="day-content" class="lesson-content markdown-content">
                    <div id="day-loading" class="skeleton-loader" aria-live="polite">
                        <div class="skeleton-line skeleton-line--short"></div>
                        <div class="skeleton-line skeleton-line--full"></div>
                        <div class="skeleton-line skeleton-line--medium"></div>
                    </div>
                </div>
            </section>

            <section id="day-complete-block" class="day-complete-block card" style="display:none">
                <div class="day-complete-block__icon">✅</div>
                <h2>День завершён!</h2>
                <p class="text-secondary">Отличная работа. Можно переходить дальше или вернуться к курсу.</p>
                <div class="day-complete-block__actions">
                    <button id="next-day" class="btn-primary">Перейти к следующему дню</button>
                    <a href="index.html" class="btn-secondary day-complete-block__link">Вернуться к курсу</a>
                </div>
            </section>

            <section id="day-locked-block" class="day-locked-block locked-state card" style="display:none">
                <div class="day-locked-block__icon">🔒</div>
                <h2>День недоступен</h2>
                <p>Этот день откроется после предыдущего занятия</p>
                <a href="index.html" class="btn-secondary day-locked-block__link">Вернуться к курсу</a>
            </section>

            <nav class="lesson-footer">
                <button id="prev-day" class="lesson-footer__link hidden">
                    <svg class="lesson-footer__icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 19l-7-7 7-7"></path>
                    </svg>
                    Предыдущий день
                </button>
            </nav>
        </main>
    </div>

    <!-- Local JS -->
    <script src="js/loader.js?v=1.1"></script>
    <script src="js/access.js?v=1.1"></script>
    <script src="js/progress.js?v=1.1"></script>
    <script src="js/telegram.js?v=1.1"></script>
    <script src="js/supabase.js?v=1.1"></script>
    <script src="js/day.js?v=1.3"></script>

</body>

</html>
