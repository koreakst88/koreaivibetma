<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Курс: Vibe Coding</title>

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Amplitude Browser SDK -->
    <script src="js/amplitude.min.js"></script>
    <script src="js/analytics.js"></script>

    <!-- Local CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-50 text-gray-900 font-sans">

    <div id="app-container">
        <div class="container max-w-4xl mx-auto p-4">

        <!-- Header -->
        <header class="mb-8">
            <h1 class="text-3xl font-bold mb-6">Как создавать цифровые проекты с помощью ИИ</h1>
            <div class="bg-white rounded-lg shadow p-4">
                <div id="progress-text" class="text-lg font-semibold mb-2">Прогресс: 0/7</div>
                <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden">
                    <div id="progress-fill" class="bg-blue-500 h-4 rounded-full transition-all duration-500"
                        style="width: 0%"></div>
                </div>
            </div>
        </header>

        <!-- Секция "Всегда доступно" -->
        <section class="mb-8">
            <h2 class="text-2xl font-bold mb-4">📚 Всегда доступно</h2>
            <!-- Адаптивная сетка для карточек -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <a href="prompts.html" class="block bg-white rounded-lg shadow p-4 hover:shadow-md transition-shadow">
                    <h3 class="text-xl font-bold text-blue-600 mb-2">Библиотека промптов</h3>
                    <p class="text-gray-600">14+ готовых промптов</p>
                </a>
                <a href="cheatsheets.html"
                    class="block bg-white rounded-lg shadow p-4 hover:shadow-md transition-shadow">
                    <h3 class="text-xl font-bold text-blue-600 mb-2">Шпаргалки</h3>
                    <p class="text-gray-600">Команды, горячие клавиши</p>
                </a>
            </div>
        </section>

        <!-- Секция "Материалы по дням" -->
        <section class="mb-8">
            <h2 class="text-2xl font-bold mb-4">📅 Материалы по дням</h2>
            <!-- Пустой контейнер -->
            <div id="days-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

        <!-- Footer -->
        <footer class="text-center mt-12 mb-8">
            <button onclick="contactTeacher()"
                class="bg-blue-500 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-600 transition-colors w-full sm:w-auto">
                💬 Написать преподавателю
            </button>
        </footer>

        </div>
    </div>

    <!-- Local JS -->
    <script src="js/progress.js"></script>
    <script src="js/access.js"></script>
    <script src="js/telegram.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
