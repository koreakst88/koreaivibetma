<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека промптов</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Local CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-50 text-gray-900 font-sans min-h-screen flex flex-col">

    <div class="container max-w-3xl mx-auto p-4 flex-grow flex flex-col">

        <!-- Header -->
        <header class="mb-6 flex items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <button onclick="goBack()"
                class="text-blue-500 hover:text-blue-700 font-medium flex items-center transition-colors">
                <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Назад
            </button>
            <h1 class="text-xl font-bold ml-4 text-gray-800 truncate flex-grow">📖 Библиотека промптов</h1>
        </header>

        <!-- Поиск -->
        <div class="mb-6">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input type="text" id="search-prompts" placeholder="Поиск по номеру или названию..."
                    class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent rounded-xl shadow-sm transition-shadow">
            </div>
        </div>

        <!-- Основной контент (Карточки промптов) -->
        <main class="flex-grow">
            <div id="prompts-container" class="space-y-4">
                <!-- Контент загружается через JS -->
            </div>
        </main>

    </div>

    <!-- Local JS -->
    <script src="js/telegram.js"></script>
    <script src="js/prompts.js"></script>

</body>

</html>
